<!doctype html>
<html lang="en">
<head>
    <title>Superscript / Subscript tag</title>
</head>
<body>
    <big>(a+b)2 = a2 + b2 + 2ab</big><hr>
    <big>(a+b)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + 2ab</big><hr>

    <big>CH4 + O2 => H20 + CO2</big><hr>
    <big>CH<suB>4</suB> + O<sub>2</sub> => H<sub>2</sub>O+ CO<sub>2</sub><hr>
</body>
</html>
