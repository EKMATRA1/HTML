<!doctype html>
<html lang="en">
  <head>
    <title>Ordered Lists</title>
  </head>
  <body>
    <ol>
      <li>Wake up</li>
      <li>Brush your teeth</li>
      <li>Take a shower</li>
      <li>Have breakfast</li>
      <li>Go to Work</li>
    </ol>

    <ol type="A">
      <li>Apple</li>
      <li>Banana</li>
      <li>Cherry</li>
      <li>Dragonfruit</li>
    </ol>

    <ol type="a">
      <li>Apple</li>
      <li>Banana</li>
      <li>Cherry</li>
      <li>Dragonfruit</li>
    </ol>

    <ol type="I">
      <li>Apple</li>
      <li>Banana</li>
      <li>Cherry</li>
      <li>Dragonfruit</li>
    </ol>

    <ol type="i">
      <li>Apple</li>
      <li>Banana</li>
      <li>Cherry</li>
      <li>Dragonfruit</li>
    </ol>
  </body>
</html>
