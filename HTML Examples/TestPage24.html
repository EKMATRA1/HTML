<html>
<head><title>Creating Ordered and Unordered List</title>
</head>
<body>
 <h2>Program Load</h2>
 <ol type="1">
 <li>Displays items using Arabic numerals (default)</li>
 </ol>
 <ol type="a">
 <li> Displays items using lowercase letters</li> 
 </ol>
 <ol type="A">
 <li>Displays items using uppercase letters</li>
 </ol>
 <ol type="i">
 <li>Displays items using lowercase roman numerals</li>
 </ol>
 <ol type="I">
 <li>Displays items using uppercase roman numerals</li>
 </ol>
</body>
</html>
