<!DOCTYPE html>
<html>
<head>
<title>University Student Registration Form</title>
</head>
<body>

<h2>Student Registration Form</h2>

<form action="/submit_registration" method="post">
  
  <label for="fname">First Name:</label><br>
  <input type="text" id="fname" name="firstname" required><br><br>
  
  <label for="lname">Last Name:</label><br>
  <input type="text" id="lname" name="lastname" required><br><br>
  
  <label for="email">Email:</label><br>
  <input type="email" id="email" name="email" required><br><br>
  
  <label for="phone">Phone Number:</label><br>
  <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" title="Enter 10 digit phone number" required><br><br>
  
  <label for="dob">Date of Birth:</label><br>
  <input type="date" id="dob" name="dob" required><br><br>
  
  <label for="gender">Gender:</label><br>
  <input type="radio" id="male" name="gender" value="male" required>
  <label for="male">Male</label>
  <input type="radio" id="female" name="gender" value="female">
  <label for="female">Female</label>
  <input type="radio" id="other" name="gender" value="other">
  <label for="other">Other</label><br><br>
  
  <label for="course">Course Enrolled:</label><br>
  <select id="course" name="course" required>
    <option value="">Select course</option>
    <option value="bca">BCA</option>
    <option value="bsc">BSc</option>
    <option value="ba">BA</option>
    <option value="bcom">BCom</option>
  </select><br><br>
  
  <label for="address">Address:</label><br>
  <textarea id="address" name="address" rows="4" cols="40" required></textarea><br><br>
  
  <input type="submit" value="Register">
  <input type="reset" value="Reset">

</form>

</body>
</html>
